############################################# Monitors #############################################

monitorv2 {
    output = eDP-1
    mode = 1920x1080@65
    position = 0x1080
    transform = 0
    scale = 1
    bitdepth = 8
    cm = srgb
    supports_hdr = 0
}

monitorv2 {
    output = HDMI-A-1
    mode = 1920x1080@65
    position = 0x0
    transform = 0
    scale = 1
    bitdepth = 8
    cm = srgb
    supports_hdr = 0
}

############################################# Variables ############################################

$scripts-directory = /home/endchill/Nextcloud/scripts

$aimp              = /home/endchill/.local/share/applications/wine/aimp.sh
$grimblast         = $scripts-directory/grimblast.sh
$image2text        = $scripts-directory/image2text.sh
$mpv-backend       = $scripts-directory/mpv_backend.sh run
$mute-all-mics     = $scripts-directory/mute_all_mics_toggle.sh
$scrcpy-audio      = $scripts-directory/scrcpy_audio.sh
$scrcpy-video      = $scripts-directory/scrcpy_video.sh
$tmp               = $scripts-directory/tmp.sh
$touchpad-disabler = $scripts-directory/touchpad_disabler.sh

$tailscale_file    = sudo tailscale file get /home/endchill
$terminal          = alacritty
$launcher          = hyprlauncher

############################################# Autostart ############################################

exec-once = ags run
exec-once = alacritty --daemon
exec-once = bash -c 'wl-paste --type image --watch cliphist store & wl-paste --type text --watch cliphist store'
# exec-once = com.discordapp.Discord %U
exec-once = easyeffects --gapplication-service
exec-once = /opt/freedownloadmanager/fdm --hidden
exec-once = hyprpaper
exec-once = bash -c 'kdeconnect-indicator & kdeconnect'
exec-once = kwalletd6
exec-once = mako
exec-once = nextcloud
exec-once = /usr/lib/polkit-kde-authentication-agent-1
# exec-once = steam -silent %U
exec-once = dev.vencord.Vesktop %U
# exec-once = waybar
exec-once = wl-clip-persist --clipboard regular

exec-once = hyprlauncher -d
exec-once = rm /home/endchill/.cache/cliphist/db

####################################### Environment Variables ######################################

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = XDG_MENU_PREFIX,arch-
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = GTK_THEME,SulfurCarbide
env = QT_QPA_PLATFORMTHEME,qt6ct
env = COLOR_SCHEME,prefer-dark

########################################### Look and Feel ##########################################

general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    col.active_border =rgb(ffbf00)
    col.inactive_border = rgb(4f4f4f)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 24
    rounding_power = 2

    shadow {
        enabled = true
        range = 16
        render_power = 16
        color = rgba(171717df)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 1
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,       0.25, 1.00, 0.33, 1.00
    bezier = linear,             0.00, 0.00, 1.00, 1.00
    bezier = almostLinear,       0.50, 0.50, 0.75, 1.00
    bezier = easeInSineOutQuart, 0.13, 0.00, 0.13, 1.00
    bezier = easeInOutQuad,      0.50, 0.00, 0.50, 1.00
    bezier = easeInQuadOutSine,  0.67, 0.00, 0.75, 0.88

    animation = global,          1, 10.0, default
    animation = border,          1, 5.00, easeOutQuint
    animation = windows,         1, 3.00, easeOutQuint
    animation = windowsIn,       1, 3.00, easeOutQuint,      gnomed
    animation = windowsOut,      1, 2.00, linear,            slide
    animation = fadeIn,          1, 1.75, almostLinear
    animation = fadeOut,         1, 1.50, almostLinear
    animation = fade,            1, 3.00, easeInSineOutQuart
    animation = layers,          1, 3.75, easeOutQuint
    animation = layersIn,        1, 4.00, easeOutQuint,      fade
    animation = layersOut,       1, 1.50, linear,            fade
    animation = fadeLayersIn,    1, 1.75, almostLinear
    animation = fadeLayersOut,   1, 1.33, almostLinear
    animation = workspaces,      1, 1.50, easeInOutQuad,     fade
    animation = workspacesIn,    1, 1.50, easeInOutQuad,     slidefade 12.5%
    animation = workspacesOut,   1, 1.50, easeInOutQuad,     slidefade 12.5%
    animation = zoomFactor,      1, 7.00, easeInSineOutQuart
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    enable_swallow = true
}

ecosystem {
    no_update_news = true
}

############################################### Input ##############################################

input {
    kb_layout = us,ara
    kb_variant =
    kb_model =
    kb_options = caps:return,grp:win_space_toggle
    kb_rules =
    repeat_rate = 67
    repeat_delay = 200
    follow_mouse = 1

    sensitivity = -0.2
    accel_profile = flat
    force_no_accel = true

    touchpad {
        clickfinger_behavior = true
        disable_while_typing = false
        clickfinger_behavior = true
        natural_scroll = true
        scroll_factor = 0.4
        tap-and-drag = true
        tap-to-click = true
    }
}

device {
    name = elan2204:00-04f3:3109-touchpad
    enabled = false
}

device {
    name = hid-256c:006d
    output = eDP-1
}

cursor {
    no_hardware_cursors = true
}

